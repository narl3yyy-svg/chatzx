# Replace .github/workflows/build-apk.yml with this file on GitHub to build
# Android APK + Windows portable zip on every v* tag.

# Builds chatxz releases on version tags: Android APK + Windows portable zip.
name: Build Releases

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.51). Leave empty to use build.gradle versionName.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Read app version from build.gradle.kts
        id: appver
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle.kts | head -1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Sync Python sources into Android bundle
        run: bash scripts/sync-android.sh

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT="${{ github.event.inputs.version }}"
            if [ -n "$INPUT" ]; then
              VERSION="${INPUT#v}"
            else
              VERSION="${{ steps.appver.outputs.name }}-build.${GITHUB_RUN_NUMBER}"
            fi
            TAG="v${VERSION}"
          fi
          APK="chatxz-${VERSION}.apk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "${{ steps.version.outputs.apk }}"

      - uses: actions/upload-artifact@v7
        with:
          name: chatxz-${{ steps.version.outputs.version }}-apk
          path: ${{ steps.version.outputs.apk }}

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: chatxz v${{ steps.version.outputs.version }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Android | `${{ steps.version.outputs.apk }}` |
            | Windows 11 portable | `chatxz-${{ steps.version.outputs.version }}-windows-portable.zip` |

            **Windows:** unzip, double-click `chatxz.exe`. Data in `chatxz-data\` beside the exe.
          files: ${{ steps.version.outputs.apk }}
          make_latest: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT="${{ github.event.inputs.version }}"
            if [ -n "$INPUT" ]; then
              VERSION="${INPUT#v}"
            else
              VERSION=$(grep '__version__' chatxz/_version.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            fi
            TAG="v${VERSION}"
          fi
          ZIP="chatxz-${VERSION}-windows-portable.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Build portable zip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rns>=1.3.0" "aiohttp>=3.9.0" pyinstaller
          python -m pip install -e .
          pyinstaller --noconfirm packaging/windows/chatxz-portable.spec
          Copy-Item packaging/windows/README-PORTABLE.txt dist/chatxz/ -Force
          $zip = "${{ steps.version.outputs.zip }}"
          Compress-Archive -Path dist/chatxz -DestinationPath "dist/$zip" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: chatxz-${{ steps.version.outputs.version }}-windows-portable
          path: dist/${{ steps.version.outputs.zip }}

      - name: Publish Windows zip to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/${{ steps.version.outputs.zip }}
          append_body: true
          make_latest: false