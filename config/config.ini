[reticulum]
# Enable transport for message relaying
enable_transport = Yes

# Store your peer identity here
share_identity = Yes

# Interface configuration for local network discovery
[interfaces]
  [[UDP Interface]]
    type = UDPInterface
    listen_ip = 0.0.0.0
    listen_port = 4242
    forward_ip = 255.255.255.255
    forward_port = 4242
    ifac_size = 8

  [[TCP Client Interface]]
    type = TCPClientInterface
    # Use this to connect to a remote Reticulum peer
    # target_host = your-friend-ip
    # target_port = 4242
