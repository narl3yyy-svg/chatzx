# Builds chatxz Android APK on version tags and manual dispatch.
# Every successful build publishes to GitHub Releases.

name: Build Android APK
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.3). Leave empty to use build.gradle versionName + build number.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Read app version from build.gradle.kts
        id: appver
        run: |
          VERSION_NAME=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle.kts | head -1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Gradle version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Sync Python sources into Android bundle
        run: bash scripts/sync-android.sh

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT="${{ github.event.inputs.version }}"
            if [ -n "$INPUT" ]; then
              VERSION="${INPUT#v}"
            fi
            TAG="v${VERSION}"
          else
              VERSION="${{ steps.appver.outputs.name }}-build.${GITHUB_RUN_NUMBER}"
            fi
            TAG="v${VERSION}"
          fi
          APK="chatxz-${VERSION}.apk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${VERSION} (tag ${TAG})"

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "${{ steps.version.outputs.apk }}"

      - uses: actions/upload-artifact@v7
        with:
          name: chatxz-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.apk }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: chatxz v${{ steps.version.outputs.version }}
          body: |
            Android APK (arm64-v8a) for chatxz.

            | Field | Value |
            |-------|-------|
            | Version | ${{ steps.version.outputs.version }} |
            | Gradle versionName | ${{ steps.appver.outputs.name }} |
            | Gradle versionCode | ${{ steps.appver.outputs.code }} |
            | Build | #${{ github.run_number }} |
            | Commit | `${{ github.sha }}` |

            **Install:** download `${{ steps.version.outputs.apk }}` below and sideload on your device.

            **Recent Android fixes (0.3.x):**
            - Mobile sidebar overlay z-index fixed (menu no longer blurred; sidebar stays interactive)
            - LAN announces use subnet-directed UDP broadcast on Android
            - Wi-Fi multicast lock held while the app runs
            - Chat starts disconnected after server restart; history loads per peer on connect
          files: ${{ steps.version.outputs.apk }}
          make_latest: true
